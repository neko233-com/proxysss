name: ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install actionlint
        shell: bash
        run: |
          curl -sSL -o actionlint.tar.gz https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          tar -xzf actionlint.tar.gz actionlint
          chmod +x actionlint
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Lint GitHub Actions workflows
        run: actionlint

      - name: Validate changelog entry
        shell: bash
        run: |
          version="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)"
          test -n "$version"
          grep -Eq "^## v${version}( |$)" CHANGELOG.md

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-quality-ubuntu

      - name: Rustfmt check
        run: cargo fmt --all -- --check

      - name: Clippy check
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --workspace --all-targets

  build:
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
          - runner: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-host-${{ matrix.target }}

      - name: Build release
        run: cargo build --locked --release --target ${{ matrix.target }}
