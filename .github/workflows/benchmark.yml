name: benchmark

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NGINX_VERSION: "1.31.0"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/benchmark-helper.go"
      - "scripts/benchmark-*.ps1"
      - "scripts/benchmark-*.sh"
      - "scripts/benchmark-baseline.json"
      - ".github/workflows/benchmark.yml"

jobs:
  all-protocols-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-bench-ubuntu

      - uses: actions/cache@v4
        with:
          path: .benchmark/vendors
          key: benchmark-vendors-linux-${{ env.NGINX_VERSION }}-v2

      - name: Install build deps for nginx
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre3-dev zlib1g-dev libssl-dev

      - name: Build proxysss release
        run: cargo build --locked --release

      - name: Apply Linux benchmark tuning
        run: sudo ./target/release/proxysss tune linux --apply --profile latency --max-connections 200000

      - name: Gateway mixed all-protocol benchmark
        env:
          QUICK: "1"
          DURATION_SECS: "12"
          MIXED_MATRIX: "1"
        run: |
          chmod +x scripts/benchmark-all-scenarios.sh
          bash scripts/benchmark-all-scenarios.sh

      - if: always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results-linux
          path: |
            .benchmark/runs/all-scenarios/results.json
            .benchmark/runs/all-scenarios/summary.md
            .benchmark/runs/all-scenarios/summary.html
          if-no-files-found: error

  throughput-windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-bench-windows

      - uses: actions/cache@v4
        with:
          path: .benchmark/vendors
          key: benchmark-vendors-windows-${{ env.NGINX_VERSION }}-v2

      - name: Build proxysss release
        run: cargo build --locked --release

      - name: Gateway throughput smoke benchmark
        shell: pwsh
        run: ./scripts/benchmark-gateways.ps1 -Quick

      - if: always()
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-results-windows
          path: |
            .benchmark/runs/latest/results.json
            .benchmark/runs/latest/report.md
            .benchmark/runs/latest/report.html
            .benchmark/runs/latest/nginx-compare.md
            .benchmark/runs/latest/nginx-compare.html
          if-no-files-found: error
