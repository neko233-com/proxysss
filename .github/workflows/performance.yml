name: performance

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - agent/wss-acme-performance
  workflow_dispatch:
    inputs:
      duration_secs:
        description: Seconds per mixed-load scenario
        required: true
        default: "10"
      stream_connections_per_core:
        description: Concurrent stream clients per detected CPU core
        required: true
        default: "4"
      http_concurrency_per_core:
        description: Concurrent HTTP clients per detected CPU core
        required: true
        default: "16"
      strict_superiority:
        description: Require every scenario and aggregate throughput to beat nginx
        required: true
        type: boolean
        default: true

concurrency:
  group: performance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ubuntu24-amd64-docker:
    name: Ubuntu 24 x86_64 Docker mixed-load
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: performance-ubuntu24-amd64
          cache-on-failure: true

      - name: Verify runner architecture
        shell: bash
        run: |
          set -euo pipefail
          test "$(uname -s)" = Linux
          test "$(uname -m)" = x86_64
          . /etc/os-release
          test "$ID" = ubuntu
          test "$VERSION_ID" = "24.04"
          docker version

      - name: Build optimized proxysss binary
        run: cargo build --locked --release

      - name: Build Ubuntu 24 benchmark image
        run: docker build -f docker/ubuntu24-bench.Dockerfile -t proxysss-ubuntu24-bench .

      - name: Run strict mixed-load benchmark in Docker
        shell: bash
        env:
          DURATION_SECS: ${{ inputs.duration_secs || '10' }}
          STREAM_CONNECTIONS_PER_CORE: ${{ inputs.stream_connections_per_core || '4' }}
          HTTP_CONCURRENCY_PER_CORE: ${{ inputs.http_concurrency_per_core || '16' }}
          STRICT_SUPERIORITY: ${{ (github.event_name == 'push' || inputs.strict_superiority) && '1' || '0' }}
        run: |
          set -euo pipefail
          cores="$(nproc)"
          stream_connections="$((cores * STREAM_CONNECTIONS_PER_CORE))"
          http_concurrency="$((cores * HTTP_CONCURRENCY_PER_CORE))"
          mkdir -p .benchmark
          docker run --rm \
            --network host \
            --ulimit nofile=1048576:1048576 \
            -e BUILD_PROFILE=release \
            -e FORCE_BUILD=0 \
            -e MIXED_MATRIX=1 \
            -e DURATION_SECS="$DURATION_SECS" \
            -e STREAM_CONNECTIONS="$stream_connections" \
            -e CONCURRENCY="$http_concurrency" \
            -e STRICT_SUPERIORITY="$STRICT_SUPERIORITY" \
            -e REQUIRE_ZERO_ERRORS="$STRICT_SUPERIORITY" \
            -e REQUIRE_LATENCY_PERCENTILES="$STRICT_SUPERIORITY" \
            -e GATE_LATENCY=0 \
            -e MAX_LATENCY_RATIO=1.0 \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            proxysss-ubuntu24-bench \
            bash -lc 'test "$(uname -m)" = x86_64 && bash scripts/benchmark-all-scenarios.sh' \
            2>&1 | tee .benchmark/performance-run.log

      - name: Publish benchmark summary
        if: always()
        shell: bash
        run: |
          if [[ -f .benchmark/runs/all-scenarios/summary.md ]]; then
            cat .benchmark/runs/all-scenarios/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Benchmark did not produce summary.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu24-amd64-docker-performance
          if-no-files-found: warn
          retention-days: 7
          path: |
            .benchmark/performance-run.log
            .benchmark/runs/all-scenarios/results.json
            .benchmark/runs/all-scenarios/summary.md
            .benchmark/runs/all-scenarios/summary.html
