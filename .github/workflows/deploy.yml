name: deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Deployment profile name
        required: true
        default: production
  push:
    branches:
      - main

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-pc-windows-msvc
            binary: proxysss.exe
            artifact: deploy-windows-amd64
            archive: deploy-windows-amd64.zip
            use_xwin: true
          - runner: ubuntu-latest
            target: aarch64-pc-windows-msvc
            binary: proxysss.exe
            artifact: deploy-windows-arm64
            archive: deploy-windows-arm64.zip
            use_xwin: true
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: proxysss
            artifact: deploy-linux-amd64
            archive: deploy-linux-amd64.tar.gz
            use_xwin: false
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary: proxysss
            artifact: deploy-darwin-amd64
            archive: deploy-darwin-amd64.tar.gz
            use_xwin: false

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: taiki-e/install-action@v2
        if: matrix.use_xwin
        with:
          tool: cargo-xwin@0.22.0

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-target-${{ matrix.target }}

      - name: Build
        if: ${{ !matrix.use_xwin }}
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build (Windows MSVC cross)
        if: matrix.use_xwin
        run: cargo xwin build --locked --release --target ${{ matrix.target }}

      - name: Package bundle (tar.gz)
        if: endsWith(matrix.archive, '.tar.gz')
        shell: bash
        run: |
          mkdir -p bundle/scripts
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} bundle/
          cp README.md bundle/
          for doc in proxysss-script.d.ts ts-how-to-use.md nginx-to-proxysss.md; do
            if [ -f "$doc" ]; then cp "$doc" bundle/; fi
          done
          for script in install.sh install.ps1; do
            if [ -f "scripts/$script" ]; then cp "scripts/$script" bundle/scripts/; fi
          done
          tar -czf ${{ matrix.archive }} -C bundle .

      - name: Package bundle (zip)
        if: endsWith(matrix.archive, '.zip')
        shell: bash
        run: |
          rm -rf bundle
          mkdir -p bundle/scripts
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} bundle/
          cp README.md bundle/
          for doc in proxysss-script.d.ts ts-how-to-use.md nginx-to-proxysss.md; do
            if [ -f "$doc" ]; then cp "$doc" bundle/; fi
          done
          for script in install.sh install.ps1; do
            if [ -f "scripts/$script" ]; then cp "scripts/$script" bundle/scripts/; fi
          done
          rm -f ${{ matrix.archive }}
          (
            cd bundle
            zip -qr ../${{ matrix.archive }} .
          )

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          compression-level: 0
          path: ${{ matrix.archive }}

  deploy-summary:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Emit deployment summary
        run: |
          echo "Deploy profile: ${{ github.event.inputs.profile || 'production' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Build artifacts are ready in workflow artifacts." >> "$GITHUB_STEP_SUMMARY"
