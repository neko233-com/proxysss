name: deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Deployment profile name
        required: true
        default: production
  push:
    branches:
      - main

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: proxysss.exe
            artifact: deploy-windows-amd64
            archive: deploy-windows-amd64.zip
            use_xwin: false
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            binary: proxysss.exe
            artifact: deploy-windows-arm64
            archive: deploy-windows-arm64.zip
            use_xwin: false
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: proxysss
            artifact: deploy-linux-amd64
            archive: deploy-linux-amd64.tar.gz
            use_xwin: false
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary: proxysss
            artifact: deploy-darwin-amd64
            archive: deploy-darwin-amd64.tar.gz
            use_xwin: false

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-target-${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package bundle (tar.gz)
        if: endsWith(matrix.archive, '.tar.gz')
        shell: bash
        run: |
          mkdir -p bundle/scripts
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} bundle/
          cp README.md bundle/
          for doc in proxysss-script.d.ts ts-how-to-use.md nginx-to-proxysss.md; do
            if [ -f "$doc" ]; then cp "$doc" bundle/; fi
          done
          for script in install.sh install.ps1; do
            if [ -f "scripts/$script" ]; then cp "scripts/$script" bundle/scripts/; fi
          done
          tar -czf ${{ matrix.archive }} -C bundle .

      - name: Package bundle (zip)
        if: endsWith(matrix.archive, '.zip')
        shell: pwsh
        run: |
          Remove-Item bundle -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path bundle -Force | Out-Null
          New-Item -ItemType Directory -Path bundle/scripts -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "bundle/" -Force
          Copy-Item README.md "bundle/" -Force
          foreach ($doc in @('proxysss-script.d.ts', 'ts-how-to-use.md', 'nginx-to-proxysss.md')) {
            if (Test-Path $doc) { Copy-Item $doc "bundle/" -Force }
          }
          foreach ($script in @('install.sh', 'install.ps1')) {
            $source = Join-Path scripts $script
            if (Test-Path $source) { Copy-Item $source "bundle/scripts/" -Force }
          }
          Remove-Item "${{ matrix.archive }}" -ErrorAction SilentlyContinue
          tar.exe -a -cf "${{ matrix.archive }}" -C bundle .

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          compression-level: 0
          path: ${{ matrix.archive }}

  deploy-summary:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Emit deployment summary
        run: |
          echo "Deploy profile: ${{ github.event.inputs.profile || 'production' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Build artifacts are ready in workflow artifacts." >> "$GITHUB_STEP_SUMMARY"
