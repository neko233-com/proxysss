name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset: proxysss-windows-amd64.zip
            binary: proxysss.exe
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: proxysss-linux-amd64.tar.gz
            binary: proxysss
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: proxysss-linux-arm64.tar.gz
            binary: proxysss
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset: proxysss-darwin-amd64.tar.gz
            binary: proxysss
          - runner: macos-latest
            target: aarch64-apple-darwin
            asset: proxysss-darwin-arm64.tar.gz
            binary: proxysss

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.runner }}-${{ matrix.target }}

      - name: Install Linux ARM64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build Linux ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package bundle (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p bundle
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} bundle/
          cp -R scripts bundle/scripts
          cp README.md bundle/
          if [ -d templates ]; then cp -R templates bundle/templates; fi
          tar -czf ${{ matrix.asset }} -C bundle .

      - name: Package bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path bundle -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "bundle/" -Force
          Copy-Item scripts "bundle/scripts" -Recurse -Force
          Copy-Item README.md "bundle/" -Force
          if (Test-Path templates) { Copy-Item templates "bundle/templates" -Recurse -Force }
          Compress-Archive -Path bundle/* -DestinationPath "${{ matrix.asset }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          compression-level: 0
          path: ${{ matrix.asset }}

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Extract current changelog
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! grep -Eq "^## ${tag}( |$)" CHANGELOG.md; then
            echo "CHANGELOG.md is missing a section heading for ${tag}" >&2
            echo "Add: ## ${tag} - YYYY-MM-DD" >&2
            exit 1
          fi
          awk -v tag="$tag" '
            $0 ~ "^## " tag "( |$)" { found=1 }
            found { print }
            found && $0 ~ "^## " && $0 !~ "^## " tag "( |$)" { exit }
          ' CHANGELOG.md > RELEASE_NOTES.md
          test -s RELEASE_NOTES.md

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/**/*
