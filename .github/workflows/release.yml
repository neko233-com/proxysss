name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset: proxysss-windows-amd64.exe
            binary: proxysss.exe
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            asset: proxysss-windows-arm64.exe
            binary: proxysss.exe
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: proxysss-linux-amd64
            binary: proxysss
          - runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: proxysss-linux-arm64
            binary: proxysss
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset: proxysss-darwin-amd64
            binary: proxysss
          - runner: macos-latest
            target: aarch64-apple-darwin
            asset: proxysss-darwin-arm64
            binary: proxysss

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Build Linux ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename asset
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**