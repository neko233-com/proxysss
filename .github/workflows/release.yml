name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset: proxysss-windows-amd64.zip
            binary: proxysss.exe
            use_xwin: false
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            asset: proxysss-windows-arm64.zip
            binary: proxysss.exe
            use_xwin: false
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: proxysss-linux-amd64.tar.gz
            binary: proxysss
            use_xwin: false
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: proxysss-linux-arm64.tar.gz
            binary: proxysss
            use_xwin: false
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset: proxysss-darwin-amd64.tar.gz
            binary: proxysss
            use_xwin: false
          - runner: macos-latest
            target: aarch64-apple-darwin
            asset: proxysss-darwin-arm64.tar.gz
            binary: proxysss
            use_xwin: false

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-target-${{ matrix.target }}

      - name: Build
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package bundle (tar.gz)
        if: endsWith(matrix.asset, '.tar.gz')
        shell: bash
        run: |
          mkdir -p bundle/scripts
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} bundle/
          cp README.md bundle/
          for doc in proxysss-script.d.ts ts-how-to-use.md nginx-to-proxysss.md; do
            if [ -f "$doc" ]; then cp "$doc" bundle/; fi
          done
          for script in install.sh install.ps1; do
            if [ -f "scripts/$script" ]; then cp "scripts/$script" bundle/scripts/; fi
          done
          tar -czf ${{ matrix.asset }} -C bundle .

      - name: Package bundle (zip)
        if: endsWith(matrix.asset, '.zip')
        shell: pwsh
        run: |
          Remove-Item bundle -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path bundle -Force | Out-Null
          New-Item -ItemType Directory -Path bundle/scripts -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "bundle/" -Force
          Copy-Item README.md "bundle/" -Force
          foreach ($doc in @('proxysss-script.d.ts', 'ts-how-to-use.md', 'nginx-to-proxysss.md')) {
            if (Test-Path $doc) { Copy-Item $doc "bundle/" -Force }
          }
          foreach ($script in @('install.sh', 'install.ps1')) {
            $source = Join-Path scripts $script
            if (Test-Path $source) { Copy-Item $source "bundle/scripts/" -Force }
          }
          Remove-Item "${{ matrix.asset }}" -ErrorAction SilentlyContinue
          tar.exe -a -cf "${{ matrix.asset }}" -C bundle .

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          compression-level: 0
          path: ${{ matrix.asset }}

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Extract current changelog
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if ! grep -Eq "^## ${tag}( |$)" CHANGELOG.md; then
            echo "CHANGELOG.md is missing a section heading for ${tag}" >&2
            echo "Add: ## ${tag} - YYYY-MM-DD" >&2
            exit 1
          fi
          awk -v tag="$tag" '
            $0 ~ "^## " tag "( |$)" { found=1 }
            found { print }
            found && $0 ~ "^## " && $0 !~ "^## " tag "( |$)" { exit }
          ' CHANGELOG.md > RELEASE_NOTES.md
          test -s RELEASE_NOTES.md

      - name: Publish release assets
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: RELEASE_NOTES.md
          files: dist/**/*
