# Copy these keys into proxysss.yaml when you have a public domain.
# Fully embedded ACME — no acme.sh, certbot, cloud CLI, or account email required.
# For a normal WSS hostname, `domains` is the only required ACME input.

http:
  plain_bind: 0.0.0.0:80
  tls_bind: 0.0.0.0:443
  h3_bind: 0.0.0.0:443
  tls:
    auto_https:
      domains:
        - gateway.example.com
      # Uses production HTTP-01 by default. Email is optional, for renewal notices only.
      # email: ops@example.com
# HTTP-01 compatibility override example: this explicit form remains supported.
#    mode: acme_managed
#    acme:
#      email: ops@example.com
#      domains: [gateway.example.com]
#      challenge: http01
#      directory_production: true

# Wildcard (*.example.com) — built-in DNS-01 (configure via admin console or YAML):
#
# http:
#   tls:
#     mode: acme_managed
#     cert_path: certs/proxysss-cert.pem
#     key_path: certs/proxysss-key.pem
#     generate_self_signed_if_missing: false
#     acme:
#       email: ops@example.com
#       challenge: dns01
#       domains: [example.com, "*.example.com"]
#       directory_production: true
#       dns:
#         provider: cloudflare
#         credentials:
#           api_token: your-cloudflare-api-token
#
# No API key path:
#         provider: manual
