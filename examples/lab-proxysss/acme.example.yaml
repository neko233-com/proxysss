# Copy these keys into proxysss.yaml when you have a public domain.
# Fully embedded ACME — no acme.sh, certbot, or external CLI required.

http:
  plain_bind: 0.0.0.0:80
  tls_bind: 0.0.0.0:443
  h3_bind: 0.0.0.0:443
  tls:
    auto_https:
      enabled: true
      email: ops@example.com
      domains:
        - gateway.example.com
      production: false
    mode: acme_managed
    cert_path: certs/proxysss-cert.pem
    key_path: certs/proxysss-key.pem
    generate_self_signed_if_missing: false
    server_name: gateway.example.com
    acme:
      email: ops@example.com
      domains:
        - gateway.example.com
      challenge: http01
      directory_production: false
      renew_interval_hours: 12

# Wildcard (*.example.com) — built-in DNS-01 (configure via admin console or YAML):
