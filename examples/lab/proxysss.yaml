config_version: 1

http:
  plain_bind: 0.0.0.0:80
  tls_bind: 0.0.0.0:443
  h3_bind: 0.0.0.0:443
  tls:
    mode: self_signed
    cert_path: ./certs/proxysss-cert.pem
    key_path: ./certs/proxysss-key.pem
    generate_self_signed_if_missing: true
    server_name: lab.local

admin:
  enabled: true
  bind: 127.0.0.1:7777
  username: root
  password: root

monitoring:
  enabled: true
  path: /metrics

script:
  command: deno
  args: [run, -A, gateway.ts]
  cwd: .

plugins:
  enabled: true
  auto_load_dir: ./plugins

runtime:
  hot_reload:
    enabled: true
    interval_ms: 1500

services:
  reverse_proxy:
    routes:
      - name: http-echo
        path_prefix: /echo
        hosts: []
        upstream: http://127.0.0.1:8081
        strip_prefix: true
  ftp:
    enabled: true
    bind: 0.0.0.0:21
    upstream: 127.0.0.1:2121
  webdav:
    enabled: true
    path_prefix: /dav
    root: ./webdav
    allow_write: true
  static_sites:
    - name: lab-assets
      path_prefix: /assets
      root: ./public
      index_files: [index.html]
      autoindex: true

tcp:
  listeners:
    - name: tcp-echo
      bind: 0.0.0.0:26379

udp:
  listeners:
    - name: udp-echo
      bind: 0.0.0.0:2053

logging:
  level: info
  format: json
  access_log: true
  access_log_path: ./logs/access.log
  error_log_path: ./logs/error.log
