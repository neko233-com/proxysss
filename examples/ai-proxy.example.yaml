# New API / sub2api / OpenAI-compatible routes for ai.local
services:
  ai_proxy:
    enabled: true
    header_prefix: proxysss-
    routes:
      - name: new-api
        provider: new-api
        match_host: ai.local
        path_prefix: /v1
        upstream: http://127.0.0.1:3000
        rewrite_base_path: /v1
      - name: sub2api
        provider: sub2api
        match_host: sub2ai.local
        path_prefix: /
        upstream: http://127.0.0.1:3001
        rewrite_base_path: /v1
