<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Welcome to proxysss</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #090d1a;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      background: #ffffff;
    }

    main {
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 48px 24px;
    }

    .welcome {
      display: grid;
      justify-items: center;
      gap: 48px;
      width: min(100%, 900px);
      text-align: center;
    }

    h1 {
      margin: 0;
      color: #090d1a;
      font-size: clamp(3.25rem, 7vw, 6rem);
      font-weight: 760;
      line-height: 0.98;
      letter-spacing: -0.055em;
    }

    nav {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 254px));
      gap: 24px;
      width: min(100%, 532px);
    }

    a {
      min-height: 84px;
      display: inline-grid;
      place-items: center;
      padding: 20px 32px;
      border: 2px solid #1557ff;
      border-radius: 10px;
      color: #1557ff;
      background: #ffffff;
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      transition: transform 160ms ease, background-color 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    a:first-child {
      color: #ffffff;
      background: #1557ff;
      box-shadow: 0 10px 30px rgba(21, 87, 255, 0.18);
    }

    a:hover { transform: translateY(-2px); }
    a:first-child:hover { background: #0d49e8; }
    a:last-child:hover { background: #f5f8ff; }

    a:focus-visible {
      outline: 4px solid rgba(21, 87, 255, 0.24);
      outline-offset: 4px;
    }

    @media (max-width: 600px) {
      main { padding: 32px 20px; }
      .welcome { gap: 36px; }

      h1 {
        max-width: 9ch;
        font-size: clamp(3rem, 16vw, 4.75rem);
      }

      nav {
        grid-template-columns: 1fr;
        gap: 14px;
        width: min(100%, 320px);
      }

      a { min-height: 68px; }
    }

    @media (prefers-reduced-motion: reduce) {
      a { transition: none; }
      a:hover { transform: none; }
    }
  </style>
</head>
<body>
  <main>
    <section class="welcome" aria-labelledby="welcome-title">
      <h1 id="welcome-title">Welcome to proxysss</h1>
      <nav aria-label="Project links">
        <a href="https://github.com/neko233-com/proxysss">GitHub</a>
        <a href="https://neko233-com.github.io/proxysss/">GitHub Docs</a>
      </nav>
    </section>
  </main>
</body>
</html>
